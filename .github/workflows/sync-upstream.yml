name: Sync upstream

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/karpathy/autoresearch.git
          git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream."
          else
            echo "Behind upstream by $BEHIND commit(s)."
          fi

      - name: Merge upstream into main
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          git merge upstream/master \
            --no-edit \
            -m "chore: sync upstream karpathy/autoresearch"
        continue-on-error: true

      - name: Auto-resolve conflicts in custom files
        if: steps.check.outputs.behind != '0' && steps.merge.outcome == 'failure'
        id: resolve
        run: |
          # Files we've intentionally diverged from upstream — always keep ours
          CUSTOM_FILES=(
            README.md
            .gitignore
          )

          CONFLICTED=$(git diff --name-only --diff-filter=U)
          if [ -z "$CONFLICTED" ]; then
            echo "No conflicted files found (unexpected). Aborting."
            echo "resolved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Conflicted files:"
          echo "$CONFLICTED"

          UNRESOLVABLE=""
          for file in $CONFLICTED; do
            IS_CUSTOM=false
            for custom in "${CUSTOM_FILES[@]}"; do
              if [ "$file" = "$custom" ]; then
                IS_CUSTOM=true
                break
              fi
            done

            # Also auto-resolve any file under our custom directories
            case "$file" in
              .github/workflows/*|diagrams/*) IS_CUSTOM=true ;;
            esac

            if $IS_CUSTOM; then
              echo "  ✓ Keeping ours: $file"
              git checkout --ours "$file"
              git add "$file"
            else
              echo "  ✗ Cannot auto-resolve: $file"
              UNRESOLVABLE="$UNRESOLVABLE $file"
            fi
          done

          if [ -n "$UNRESOLVABLE" ]; then
            echo "resolved=false" >> "$GITHUB_OUTPUT"
            echo "unresolvable=$UNRESOLVABLE" >> "$GITHUB_OUTPUT"
            git merge --abort
          else
            git commit --no-edit -m "chore: sync upstream (auto-resolved custom file conflicts)"
            echo "resolved=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push if merge succeeded
        if: |
          steps.check.outputs.behind != '0' && (
            steps.merge.outcome == 'success' ||
            steps.resolve.outputs.resolved == 'true'
          )
        run: git push origin main

      - name: Open issue if unresolvable conflicts remain
        if: |
          steps.check.outputs.behind != '0' &&
          steps.merge.outcome == 'failure' &&
          steps.resolve.outputs.resolved == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEHIND: ${{ steps.check.outputs.behind }}
          UNRESOLVABLE: ${{ steps.resolve.outputs.unresolvable }}
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master)

          # Don't create duplicate issues
          EXISTING=$(gh issue list --label "sync" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Open sync issue #${EXISTING} already exists. Skipping."
            exit 0
          fi

          gh issue create \
            --title "Upstream sync conflict — manual merge needed" \
            --body "$(cat <<EOF
          Automated upstream sync failed due to merge conflicts in upstream-owned files.

          **Upstream**: \`karpathy/autoresearch\` (master)
          **Behind by**: ${BEHIND} commit(s)
          **Upstream HEAD**: \`${UPSTREAM_SHA}\`

          ### Conflicted files (could not auto-resolve)

          \`\`\`
          ${UNRESOLVABLE}
          \`\`\`

          These are files that exist in both upstream and our fork with divergent changes.
          Custom-only files (README.md, .gitignore, diagrams/, workflows/) are auto-resolved
          by keeping our version.

          ### To resolve manually

          \`\`\`bash
          git fetch upstream master
          git merge upstream/master
          # Resolve conflicts — keep metaresearch additions, accept upstream logic changes
          git push origin main
          \`\`\`

          ### Custom files (never conflict with upstream)

          These are new files that don't exist upstream:
          \`metaresearch.py\`, \`metaresearch_program.md\`, \`metric.py\`, \`eval.py\`,
          \`CLAUDE.md\`, \`target.md\`, \`diagrams/\`
          EOF
          )" \
            --label "sync"
